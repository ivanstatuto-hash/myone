<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>myOne</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0b1120;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#fff;overscroll-behavior:none;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{display:none}
input,select,textarea,button{font-family:inherit;font-size:inherit}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;background:#0b1120;position:relative}
.page{padding:0 16px 90px}
.card{background:#132040;border-radius:14px;padding:14px;border:1px solid #2a3f66;margin-bottom:10px}
.inp{width:100%;border:1.5px solid #2a4a80;border-radius:10px;padding:11px 14px;font-size:14px;background:#0d1e38;color:#fff;outline:none;margin-bottom:10px;display:block;appearance:none;-webkit-appearance:none}
.lbl{font-size:11px;font-weight:700;color:#c0cfe8;margin-bottom:4px;display:block;letter-spacing:.5px}
.badge{border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:#fff;display:inline-block;white-space:nowrap}
.hdr{position:sticky;top:0;z-index:100;background:rgba(11,17,32,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a3f66}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(11,17,32,.98);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid #2a3f66;padding:4px 0;display:flex;justify-content:space-around;z-index:100}
.navbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 10px;border-radius:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#0f1929;border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border:1px solid #2a3f66;padding:20px}
.tabs{display:flex;background:#132040;border-radius:12px;border:1px solid #2a3f66;overflow:hidden;margin-bottom:10px}
.tab{flex:1;padding:11px 4px;border:none;background:transparent;cursor:pointer;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;color:#c0cfe8;border-bottom:2px solid transparent}
.tab.on{color:#fff;border-bottom-color:#2d6ef5}
.evrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #2a3f66;cursor:pointer}
.chkrow{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid #2a3f66;border-radius:12px;margin-bottom:7px;cursor:pointer;background:#0d1527;transition:all .15s}
.chkrow.on{border-color:#f5c842;background:#1a1500}
.sechdr{font-weight:800;font-size:13px;color:#fff;border-bottom:1px solid #2a3f66;padding-bottom:6px;margin-bottom:10px}
.btn{width:100%;background:linear-gradient(135deg,#2d6ef5,#1a4fc4);border:none;border-radius:12px;padding:12px 0;color:#fff;font-weight:700;font-size:14px;cursor:pointer;display:block;margin-bottom:8px;text-align:center}
.btn-red{background:transparent;border:1.5px solid #e74c3c;color:#e74c3c}
.btn-green{background:linear-gradient(135deg,#2ecc71,#1e8449)}
.sidebar{position:fixed;inset:0;z-index:200;display:flex}
.sidebar-panel{width:80%;max-width:280px;background:#0b1120;height:100%;overflow-y:auto;box-shadow:4px 0 30px rgba(0,0,0,.8)}
.sidebar-overlay{flex:1;background:rgba(0,0,0,.4)}
select.inp option{background:#0d1e38;color:#fff}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
"use strict";
var C={bg:"#0b1120",blue:"#2d6ef5",dark:"#1a4fc4",card:"#132040",border:"#2a3f66",
  green:"#2ecc71",orange:"#f5a623",red:"#e74c3c",accent:"#f5c842",sub:"#c0cfe8"};
var LT={einzel45:{label:"Einzellektion",mins:45,color:"#2d6ef5"},
  doppel90:{label:"Doppellektion",mins:90,color:"#8e44ad"},
  pruefung:{label:"Fahrprüfung",mins:60,color:"#f5a623"}};
var FC={aktiv:"#2ecc71",inaktiv:"#f5a623",abgeschlossen:"#7f8c8d",archiviert:"#95a5a6"};
var FL={aktiv:"🟢 Aktiv",inaktiv:"🟡 Inaktiv",abgeschlossen:"⬛ Abgeschl.",archiviert:"🗄️ Archiviert"};

var S={page:"dashboard",student:null,sidebar:false,students:[],anfragen:[],
  profil:{vorname:"",nachname:"",rolle:"Fahrlehrer",standort:"myOne Fahrschule",email:"",telefon:"",notiz:"",foto:null}};

function setState(u){Object.assign(S,u);render();}

// DOM helpers
function el(tag,cls,style,children,events){
  var e=document.createElement(tag);
  if(cls)e.className=cls;
  if(style)Object.assign(e.style,style);
  if(children){
    var arr=Array.isArray(children)?children:[children];
    arr.forEach(function(c){
      if(c==null||c===false||c===undefined)return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
    });
  }
  if(events)Object.keys(events).forEach(function(k){e.addEventListener(k,events[k]);});
  return e;
}
function div(style,children,cls){return el("div",cls||null,style,children);}
function span(text,style){return el("span",null,style,[text]);}
function btn(text,onClick,style,cls){
  var b=el("button",cls||null,style,typeof text==="string"?[text]:(Array.isArray(text)?text:[text]));
  b.addEventListener("click",onClick);
  return b;
}
function card(children,style){
  var e=el("div","card",style,null);
  (Array.isArray(children)?children:[children]).forEach(function(c){if(c)e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}
function badge(text,color){return el("span","badge",{background:color||C.blue},[text]);}
function sechdr(text){return el("div","sechdr",null,[text]);}
function inpField(lbl,val,cb,type){
  var w=div({marginBottom:"10px"});
  w.appendChild(el("label","lbl",null,[lbl]));
  var i=el("input","inp",{marginBottom:"0"});
  i.type=type||"text";i.value=val||"";
  i.addEventListener("input",function(){cb(i.value);});
  w.appendChild(i);
  return w;
}
function selField(lbl,val,cb,opts){
  var w=div({marginBottom:"10px"});
  w.appendChild(el("label","lbl",null,[lbl]));
  var s=el("select","inp",{marginBottom:"0"});
  opts.forEach(function(o){var op=el("option",null,null,[o]);op.value=o;if(o===val)op.selected=true;s.appendChild(op);});
  s.addEventListener("change",function(){cb(s.value);});
  w.appendChild(s);
  return w;
}
function chkField(lbl,icon,checked,cb){
  var row=el("div","chkrow"+(checked?" on":""),null);
  var box=div({width:"20px",height:"20px",borderRadius:"4px",border:"2px solid "+(checked?C.accent:C.border),background:checked?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",color:"#000",fontWeight:"900",flexShrink:"0"},[checked?"✓":""]);
  row.appendChild(box);
  row.appendChild(span(icon,{fontSize:"18px"}));
  row.appendChild(span(lbl,{fontSize:"14px",fontWeight:checked?"700":"400",color:checked?C.accent:"#fff",marginLeft:"4px"}));
  row.addEventListener("click",function(){cb(!checked);});
  return row;
}
function fmtD(ds){return ds?ds.split("-").reverse().join("."):"—";}
function tod(){return new Date().toISOString().slice(0,10);}
function calcEnd(t,m){if(!t)return"";var p=t.split(":"),h=+p[0],mn=+p[1],tot=h*60+mn+m;return String(Math.floor(tot/60)).padStart(2,"0")+":"+String(tot%60).padStart(2,"0");}
function ds(d){return d.toISOString().slice(0,10);}
function isToday(d){return ds(d)===tod();}
function getWeek(off){var days=[],m=new Date(),d=m.getDay();m.setDate(m.getDate()+(d===0?-6:1-d)+(off||0)*7);for(var i=0;i<7;i++){var x=new Date(m);x.setDate(m.getDate()+i);days.push(x);}return days;}
function openModal(children){
  closeModal();
  var bg=el("div","modal-bg",null);
  var m=el("div","modal",null);
  (Array.isArray(children)?children:[children]).forEach(function(c){if(c)m.appendChild(c);});
  bg.appendChild(m);
  bg.addEventListener("click",function(e){if(e.target===bg)closeModal();});
  document.body.appendChild(bg);
}
function closeModal(){var bg=document.querySelector(".modal-bg");if(bg)bg.remove();}

// ── HEADER ─────────────────────────────────────────────────────────────────
function mkHeader(){
  var h=el("div","hdr");
  var left=div({display:"flex",alignItems:"center",gap:"10px"});
  left.appendChild(btn("☰",function(){setState({sidebar:true});},
    {background:"#1a2a4a",border:"1px solid "+C.border,borderRadius:"11px",width:"38px",height:"38px",fontSize:"17px",color:"#fff"}));
  var logo=div({marginLeft:"4px"});
  logo.appendChild(div({fontSize:"14px",fontWeight:"900",lineHeight:"1",color:"#fff"},[span("my"),span("One",{color:C.blue})]));
  logo.appendChild(div({fontSize:"8px",color:C.sub,letterSpacing:"2px"},["FAHRSCHULE"]));
  left.appendChild(logo);
  h.appendChild(left);
  h.appendChild(btn("↻",function(){render();},
    {background:"#1a2a4a",border:"1px solid "+C.border,borderRadius:"11px",width:"38px",height:"38px",fontSize:"17px",color:"#fff"}));
  return h;
}

// ── BOTTOM NAV ─────────────────────────────────────────────────────────────
function mkNav(){
  var nav=el("div","nav");
  [["🏠","Home","dashboard"],["👥","Schüler","schueler"],["📅","Kalender","kalender"],["📊","Statistik","pruefung"],["👤","Profil","profil"]].forEach(function(it){
    var b=el("button","navbtn");
    b.appendChild(span(it[0],{fontSize:"20px"}));
    b.appendChild(span(it[1],{fontSize:"9px",color:S.page===it[2]?C.accent:C.sub,fontWeight:S.page===it[2]?"700":"400"}));
    b.addEventListener("click",function(){setState({page:it[2],student:it[2]!=="schueler"?null:S.student});});
    nav.appendChild(b);
  });
  return nav;
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function mkSidebar(){
  if(!S.sidebar)return null;
  var wrap=el("div","sidebar");
  var panel=el("div","sidebar-panel");
  var hdr=div({padding:"22px 18px 14px",display:"flex",alignItems:"center",gap:"10px"});
  hdr.appendChild(div({width:"30px",height:"30px",borderRadius:"8px",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",fontSize:"13px",color:"#fff"},["m1"]));
  var ld=div({});ld.appendChild(div({fontSize:"13px",fontWeight:"900",color:"#fff"},[span("my"),span("One",{color:C.blue})]));ld.appendChild(div({fontSize:"8px",color:C.sub,letterSpacing:"2px"},["FAHRSCHULE"]));
  hdr.appendChild(ld);
  hdr.appendChild(btn("✕",function(){setState({sidebar:false});},{marginLeft:"auto",background:"#1e2d45",border:"1px solid "+C.border,borderRadius:"8px",padding:"5px 8px",color:"#fff"}));
  panel.appendChild(hdr);
  [["🏠","Dashboard","dashboard"],["👥","Meine Schüler","schueler"],["📅","Kalender","kalender"],["📊","Prüfungsstatistik","pruefung"],["👤","Mein Profil","profil"]].forEach(function(it){
    var active=S.page===it[2];
    var row=div({display:"flex",alignItems:"center",gap:"12px",padding:"12px 18px",cursor:"pointer",background:active?"#1a2040":"transparent",borderLeft:active?"3px solid "+C.accent:"3px solid transparent",color:active?C.accent:C.sub,fontWeight:active?"700":"400"});
    row.appendChild(span(it[0],{fontSize:"18px"}));row.appendChild(span(it[1],{fontSize:"14px"}));
    row.addEventListener("click",function(){setState({sidebar:false,page:it[2],student:null});});
    panel.appendChild(row);
  });
  var p=S.profil,ini=((p.vorname||"?")[0]+(p.nachname||"?")[0]).toUpperCase();
  var usr=div({margin:"14px 18px",borderTop:"1px solid "+C.border,paddingTop:"12px",display:"flex",alignItems:"center",gap:"10px"});
  usr.appendChild(div({width:"32px",height:"32px",borderRadius:"50%",background:"linear-gradient(135deg,"+C.accent+",#e67e22)",display:"flex",alignItems:"center",justifyContent:"center",color:"#000",fontWeight:"900",fontSize:"13px"},[ini]));
  var ud=div({});ud.appendChild(div({fontWeight:"700",fontSize:"13px",color:"#fff"},[(p.vorname||"Fahrlehrer")+" "+(p.nachname||"")]));ud.appendChild(div({fontSize:"11px",color:C.sub},[p.rolle||"Fahrlehrer"]));
  usr.appendChild(ud);panel.appendChild(usr);
  var ov=el("div","sidebar-overlay");
  ov.addEventListener("click",function(){setState({sidebar:false});});
  panel.addEventListener("click",function(e){e.stopPropagation();});
  wrap.appendChild(panel);wrap.appendChild(ov);
  return wrap;
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function pgDashboard(){
  var page=el("div","page");
  var pr=S.profil,ss=S.students;
  var wr=div({display:"flex",alignItems:"center",gap:"12px",padding:"20px 0 14px"});
  wr.appendChild(div({width:"48px",height:"48px",borderRadius:"14px",background:"linear-gradient(135deg,"+C.blue+","+C.dark+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",fontWeight:"900",color:"#fff",flexShrink:"0"},["m1"]));
  var wd=div({});
  wd.appendChild(div({fontSize:"20px",fontWeight:"900",color:"#fff"},[(pr.vorname?"Willkommen, "+pr.vorname+"!":"Willkommen! 👋")]));
  wd.appendChild(div({fontSize:"11px",color:C.sub},["FAHRSCHULE ",span("myOne",{color:C.blue,fontWeight:"900"})]));
  wr.appendChild(wd);page.appendChild(wr);

  var fA=ss.filter(function(s){return(s.fallStatus||"aktiv")==="aktiv";}).length;
  var fI=ss.filter(function(s){return s.fallStatus==="inaktiv";}).length;
  var fAb=ss.filter(function(s){return s.fallStatus==="abgeschlossen";}).length;
  var fAr=ss.filter(function(s){return s.fallStatus==="archiviert";}).length;
  var fc=card([]);fc.appendChild(sechdr("📋 Fälle Übersicht"));
  var fg=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"});
  [[fA,"aktiv",C.green,"🟢 Aktiv"],[fI,"inaktiv",C.orange,"🟡 Inaktiv"],[fAb,"abgeschlossen","#7f8c8d","⬛ Abgeschl."],[fAr,"archiviert","#95a5a6","🗄️ Archiviert"]].forEach(function(it){
    var cc=div({background:C.card,borderRadius:"14px",padding:"12px 8px",textAlign:"center",cursor:"pointer",border:"1.5px solid "+it[2]+"33"});
    cc.appendChild(div({fontSize:"24px",fontWeight:"900",color:it[2]},[String(it[0])]));
    cc.appendChild(div({fontSize:"10px",fontWeight:"700",color:it[2],marginTop:"2px"},[it[3]]));
    cc.appendChild(div({fontSize:"9px",color:C.sub,marginTop:"3px"},["Details →"]));
    (function(key,col,lb){cc.addEventListener("click",function(){showFallDetail(key,col,lb);});})(it[1],it[2],it[3]);
    fg.appendChild(cc);
  });
  fc.appendChild(fg);page.appendChild(fc);

  var allP=ss.flatMap(function(s){return(s.lektionen||[]).filter(function(l){return l.type==="pruefung";});});
  var best=allP.filter(function(l){return l.result==="bestanden";}).length;
  var rated=allP.filter(function(l){return l.result&&l.result!=="ausstehend";}).length;
  var q=rated>0?Math.round(best/rated*10000)/100:0;
  var sg=div({display:"flex",flexWrap:"wrap",gap:"10px",marginBottom:"14px"});
  [[String(ss.length),"👥","SCHÜLER",fA+" aktiv",C.green],[String(allP.length),"🎯","PRÜFUNGEN",best+" best.",C.sub],[allP.length>0?q+"%":"—","📊","ERFOLGSQUOTE",rated>0?"Bewertet":"Keine",q>=80?C.green:C.orange],[String(ss.filter(function(s){return s.status==="Inaktiv";}).length),"👤","INAKTIVE","Schüler",C.sub]].forEach(function(it){
    var sc=div({flex:"1 1 45%",minWidth:"0",background:C.card,borderRadius:"14px",padding:"14px",border:"1px solid "+C.border});
    var top=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"});
    top.appendChild(div({background:"#1a2a4a",borderRadius:"10px",padding:"6px",fontSize:"16px"},[it[1]]));
    top.appendChild(div({fontSize:"10px",fontWeight:"700",color:C.sub,letterSpacing:"1px"},[it[2]]));
    sc.appendChild(top);sc.appendChild(div({fontSize:"22px",fontWeight:"800",color:"#fff"},[it[0]]));sc.appendChild(div({fontSize:"12px",color:it[4],marginTop:"2px"},[it[3]]));sg.appendChild(sc);
  });
  page.appendChild(sg);

  var rt=div({display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"});
  rt.appendChild(div({fontSize:"15px",fontWeight:"700",color:"#fff"},["👥 Meine Schüler"]));
  rt.appendChild(btn("Alle →",function(){setState({page:"schueler"});},{background:"none",border:"none",color:C.blue,fontWeight:"700",fontSize:"13px",cursor:"pointer"}));
  page.appendChild(rt);
  var recent=ss.filter(function(s){return s.fallStatus!=="archiviert";}).slice(0,5);
  if(recent.length===0){page.appendChild(card([div({textAlign:"center",padding:"20px 0",color:C.sub},["Noch keine Schüler"])]));}
  else{
    var rl=card([]);
    recent.forEach(function(s,i){
      var row=div({display:"flex",alignItems:"center",gap:"10px",padding:"10px 0",borderBottom:i<recent.length-1?"1px solid "+C.border:"none",cursor:"pointer"});
      row.appendChild(div({width:"34px",height:"34px",borderRadius:"50%",background:"#1a2a4a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:"0"},["👤"]));
      var inf=div({flex:"1",minWidth:"0"});inf.appendChild(div({fontWeight:"600",fontSize:"13px",color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"},[s.name]));inf.appendChild(div({fontSize:"11px",color:C.sub},[(s.lektionen||[]).length+" Lektionen"]));
      row.appendChild(inf);row.appendChild(badge(FL[s.fallStatus||"aktiv"],FC[s.fallStatus||"aktiv"]));
      (function(stu){row.addEventListener("click",function(){setState({page:"schueler",student:stu});});})(s);
      rl.appendChild(row);
    });
    page.appendChild(rl);
  }
  return page;
}

function showFallDetail(key,col,lb){
  var list=S.students.filter(function(s){return(s.fallStatus||"aktiv")===key;});
  var cc=[];
  var hdr=div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"});
  hdr.appendChild(div({fontWeight:"800",fontSize:"17px",color:col},[lb]));
  hdr.appendChild(btn("✕",closeModal,{background:C.card,border:"1px solid "+C.border,borderRadius:"9px",width:"30px",height:"30px",color:"#fff"}));
  cc.push(hdr);
  if(list.length===0){cc.push(div({textAlign:"center",padding:"20px 0",color:C.sub},["Keine Schüler"]));}
  else{list.forEach(function(s){
    var row=div({display:"flex",alignItems:"center",gap:"10px",padding:"11px",background:C.card,borderRadius:"12px",marginBottom:"8px",cursor:"pointer",border:"1px solid "+C.border});
    row.appendChild(div({width:"36px",height:"36px",borderRadius:"50%",background:"#1a2a4a",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"},["👤"]));
    var inf=div({flex:"1"});inf.appendChild(div({fontWeight:"700",fontSize:"13px",color:"#fff"},[s.name]));inf.appendChild(div({fontSize:"11px",color:C.sub},[(s.lektionen||[]).length+" Lektionen"]));
    row.appendChild(inf);row.appendChild(span("›",{color:C.sub,fontSize:"16px"}));
    (function(stu){row.addEventListener("click",function(){closeModal();setState({page:"schueler",student:stu});});})(s);
    cc.push(row);
  });}
  openModal(cc);
}

// ── SCHUELER LIST ───────────────────────────────────────────────────────────
function pgSchuelerList(){
  var page=el("div","page");
  var filter="alle",search="";
  page.appendChild(div({padding:"20px 0 4px",fontSize:"20px",fontWeight:"800",color:"#fff"},["👥 Schüler"]));

  S.anfragen.forEach(function(a){
    var ac=div({background:C.card,border:"1.5px solid "+C.blue,borderRadius:"14px",padding:"14px",marginBottom:"10px"});
    ac.appendChild(div({fontWeight:"800",fontSize:"14px",color:"#fff",marginBottom:"2px"},[a.vorname+" "+a.nachname]));
    if(a.email)ac.appendChild(div({fontSize:"12px",color:C.sub},[a.email]));
    ac.appendChild(badge("🌐 Amelia · "+(a.angemeldetAm||"Heute"),"#5b3a9b"));
    var br=div({display:"flex",gap:"8px",marginTop:"10px"});
    var aid=a.id;
    br.appendChild(btn("✅ Als Schüler aufnehmen",function(){
      var ns=Object.assign({},a,{id:Date.now(),name:a.vorname+" "+a.nachname,status:"Aktiv",fallStatus:"aktiv",lektionen:[],lektionenGuthaben:0,chfGuthaben:0});
      setState({students:S.students.concat([ns]),anfragen:S.anfragen.filter(function(x){return x.id!==aid;})});
    },{flex:"1",background:"linear-gradient(135deg,"+C.green+",#1e8449)",border:"none",borderRadius:"9px",padding:"9px 0",color:"#fff",fontWeight:"700",fontSize:"12px"}));
    br.appendChild(btn("✕",function(){setState({anfragen:S.anfragen.filter(function(x){return x.id!==aid;})});},{width:"40px",background:"transparent",border:"1px solid "+C.red,borderRadius:"9px",padding:"9px 0",color:C.red,fontWeight:"700"}));
    ac.appendChild(br);page.appendChild(ac);
  });

  var addBtn=btn("+ Neuen Schüler hinzufügen",function(){pgAddSchueler();},null,"btn");
  page.appendChild(addBtn);

  var fr=div({display:"flex",gap:"6px",marginBottom:"10px",overflowX:"auto",paddingBottom:"4px"});
  [["alle","Alle"],["aktiv","🟢 Aktiv"],["inaktiv","🟡 Inaktiv"],["archiviert","🗄️ Archiviert"]].forEach(function(f){

    cont.appendChild(card([div({textAlign:"center",padding:"10px 0"},[div({fontSize:"15px",fontWeight:"900",color:"#fff"},[span("my"),span("One",{color:C.blue})]),div({fontSize:"9px",letterSpacing:"3px",color:C.sub,marginBottom:"6px"},["FAHRSCHULE"]),div({fontSize:"11px",color:C.sub},["Version 1.0 · © 2026 myOne Fahrschule"])])]));
  }
  rebuild();
  return page;
}

// ── MAIN RENDER ─────────────────────────────────────────────────────────────
function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  var wrap=el("div","wrap");
  wrap.appendChild(mkHeader());
  var content;
  try {
    if(S.page==="dashboard")content=pgDashboard();
    else if(S.page==="schueler"&&S.student)content=pgStudentDetail();
    else if(S.page==="schueler")content=pgSchuelerList();
    else if(S.page==="kalender")content=pgKalender();
    else if(S.page==="pruefung")content=pgPruefung();
    else if(S.page==="profil")content=pgProfil();
    else content=pgDashboard();
  } catch(err) {
    content=el("div","page",null,[div({padding:"20px",color:C.red,fontFamily:"monospace",fontSize:"13px"},[div({fontWeight:"700",marginBottom:"8px",fontSize:"16px"},["⚠️ Fehler:"]),div({background:"#1a0a0a",padding:"12px",borderRadius:"8px",whiteSpace:"pre-wrap",overflowX:"auto"},[err.message+"\n"+(err.stack||"")])])]);
  }
  wrap.appendChild(content);
  wrap.appendChild(mkNav());
  app.appendChild(wrap);
  var sb=mkSidebar();if(sb)document.body.appendChild(sb);
}
render();
</script>
